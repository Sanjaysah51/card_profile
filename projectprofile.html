<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex{
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 400px;
            min-height: 560px;
            background-color: rgb(255, 255, 255);
            margin: 90px auto;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            padding-bottom: 20px;
        }
        .child1{
            position: relative;
            background-color: rgb(25, 68, 223);
            height: 200px;
            width: 100%;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .child2{
            position: absolute;
            top: 90%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 200px;
            width: 200px;
            border-radius: 50%;
            border: 7px solid rgb(25, 68, 223);
            background-image: url("sanjay dp.png");
            background-size: cover;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .child3{
            margin-top: 100px;
            width: 100%;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .child4{
            margin-top: 8px;
            width: 100%;
            text-align: center;
            color: rgb(95, 95, 95);
            font-size: 15px;
        }
        .child5{
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            margin-top: 24px;
            width: 100%;
        }
        .s1,
        .s2,
        .s3,
        .s4{
            height: 30px;
            width: 30px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .s1{
            background-image: url("https://cdn-icons-png.flaticon.com/512/733/733547.png");
        }
        .s2{
            background-image: url("https://cdn-icons-png.flaticon.com/512/733/733579.png");
        }
        .s3{
            background-image: url("https://cdn-icons-png.flaticon.com/512/733/733558.png");
        }
        .s4{
            background-image: url("https://cdn-icons-png.flaticon.com/512/733/733561.png");
        }
        .child6{
            display: flex;
            gap: 14px;
            justify-content: center;
            align-items: center;
            margin-top: 22px;
            width: 100%;
        }
        .sb1,
        .sb2{
            background-color: rgb(25, 68, 223);
            height: 40px;
            width: 140px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .child7{
            display: flex;
            gap: 18px;
            justify-content: center;
            align-items: center;
            margin-top: 18px;
            width: 100%;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="flex">
        <div class="child1">
            <div class="child2"></div>
        </div>
        
        <div class="child3"><strong>Sanjay Sah</strong></div>
        <div class="child4">software engineering</div>
        <div class="child5">
            <div class="s1"></div>
            <div class="s2"></div>
            <div class="s3"></div>
            <div class="s4"></div>
        </div>
        <div class="child6"> 
            <div class="sb1"><p style="color: white; cursor: pointer;">Subscribe</p></div>
            <div class="sb2"><p style="color: white; cursor: pointer;">Message</p></div>
        </div>
        <div class="child7">
            <span>🫶🏼60.4k</span>
            <span>💬20k</span>
            <span>📩12.4k</span>
        </div>
    </div>
</body>
</html>
